# Render Blueprint — One-click deploy for Anime Soul Whisper
# Push this repo to GitHub/GitLab, then in Render dashboard:
# "Blueprint" → connect repo → Render auto-detects render.yaml

services:
  # Backend — FastAPI web service
  - type: web
    name: auto-anime-finder-api
    runtime: python
    region: oregon
    plan: free
    buildCommand: |
      cd assets/backend
      pip install -r requirements.txt
    startCommand: |
      cd assets/backend
      uvicorn main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: PYTHONUNBUFFERED
        value: "1"
    healthCheckPath: /docs

  # Frontend — Static site served via CDN
  - type: web
    name: auto-anime-finder-ui
    runtime: static
    region: oregon
    plan: free
    buildCommand: |
      cd assets/frontend && npm install && npm run build
    staticPublishPath: assets/frontend/dist
    envVars:
      - key: VITE_API_BASE_URL
        value: https://auto-anime-finder-api.onrender.com
